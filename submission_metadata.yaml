  has_network_during_ranking: false
  pre_computation_required: false
  pre_computation_time_minutes: 0

ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for architecture discussion and code review.
  All scoring logic, feature engineering, and system design
  were engineered by the team. No candidate data was fed to
  any LLM during the ranking process.

methodology_summary: |
  Hybrid structured ranker using 7 feature groups with evidence-grounded scoring.
  Primary signal: title+career trajectory (0.30 weight) prevents keyword stuffers
  from ranking high — an HR Manager with AI skills scores near-zero on this
  dimension. Skills scored with proficiency×duration×endorsement trust model
  (skills claimed with 0 months = 0.1× trust). Behavioral signals applied as
  hard multipliers: >180d inactive = ×0.70, RRR<10% = ×0.85. Honeypot detection
  flags impossible profiles (expert skills with 0 duration, impossible YOE gaps).
  Zero external dependencies, ~31s for 100K candidates on CPU, ~150MB peak RAM.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
